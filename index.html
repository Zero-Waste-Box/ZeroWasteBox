<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Képek</title>
  <style>
    :root{
      --bg:#000;
      --text:rgba(255,255,255,0.9);
      --muted:rgba(255,255,255,0.65);
      --chip:rgba(255,255,255,0.10);
      --chipBorder:rgba(255,255,255,0.16);
      --radius:999px;
    }
    html,body{height:100%}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      -webkit-tap-highlight-color:transparent;
      overflow:hidden;
    }

    .stage{
      position:fixed;
      inset:0;
      display:grid;
      place-items:center;
      padding:env(safe-area-inset-top) env(safe-area-inset-right)
              env(safe-area-inset-bottom) env(safe-area-inset-left);
      user-select:none;
      touch-action:pan-y;
    }

    img#photo{
      max-width:100vw;
      max-height:100vh;
      width:auto;
      height:auto;
      object-fit:contain;
      -webkit-user-drag:none;
      user-select:none;
      transition:opacity 120ms ease;
    }

    .topbar{
      position:fixed;
      top:0; left:0; right:0;
      padding:calc(env(safe-area-inset-top) + 10px) 12px 10px;
      display:flex;
      align-items:center;
      justify-content:flex-start;
      gap:10px;
      background:linear-gradient(to bottom, rgba(0,0,0,0.65), transparent);
      pointer-events:none;
    }

    .chip{
      pointer-events:auto;
      display:inline-flex;
      align-items:center;
      gap:8px;
      font-size:13px;
      color:var(--text);
      padding:9px 12px;
      border-radius:var(--radius);
      background:var(--chip);
      border:1px solid var(--chipBorder);
      backdrop-filter:blur(8px);
      user-select:none;
      max-width:calc(100vw - 24px);
    }

    .muted{color:var(--muted)}
    #name{
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      max-width:56vw;
      display:inline-block;
      vertical-align:bottom;
    }

    .tapZone{
      position:fixed;
      top:0; bottom:0;
      width:34%;
      z-index:2;
    }
    .tapZone.left{left:0}
    .tapZone.right{right:0}

    .arrow{
      position:fixed;
      top:50%;
      transform:translateY(-50%);
      width:44px; height:44px;
      border-radius:999px;
      background:rgba(255,255,255,0.10);
      border:1px solid rgba(255,255,255,0.16);
      color:rgba(255,255,255,0.9);
      display:none;
      place-items:center;
      cursor:pointer;
      z-index:3;
      user-select:none;
    }
    @media (hover:hover) and (pointer:fine){
      .arrow{display:grid}
      .arrow.left{left:14px}
      .arrow.right{right:14px}
    }

    .loading{
      position:fixed;
      inset:0;
      display:grid;
      place-items:center;
      color:var(--muted);
      font-size:14px;
    }
  </style>
</head>

<body>
  <div class="stage">
    <img id="photo" alt="Photo" draggable="false" />
  </div>

  <div class="topbar">
    <div class="chip">
      <span id="counter">—</span>
      <span class="muted" id="name"></span>
    </div>
  </div>

  <div class="tapZone left" id="tapLeft" aria-label="Previous"></div>
  <div class="tapZone right" id="tapRight" aria-label="Next"></div>

  <div class="arrow left" id="arrowLeft" title="Previous">‹</div>
  <div class="arrow right" id="arrowRight" title="Next">›</div>

  <div class="loading" id="loading">Betöltés…</div>

  <script>
    const IMAGES = ["1.png", "2.png","3.png","4.png","5.png"];
    const basePath = "images/";

    const img = document.getElementById("photo");
    const counter = document.getElementById("counter");
    const nameEl = document.getElementById("name");
    const loading = document.getElementById("loading");

    let idx = 0;

    function wrap(i){
      const n = IMAGES.length;
      return (i % n + n) % n;
    }

    function setPhoto(i, { updateHash = true } = {}){
      idx = wrap(i);
      const filename = IMAGES[idx];
      const src = basePath + filename;

      loading.style.display = "grid";
      img.style.opacity = "0";

      const pre = new Image();
      pre.onload = () => {
        img.src = src;
        img.onload = () => {
          loading.style.display = "none";
          img.style.opacity = "1";
        };
      };
      pre.onerror = () => {
        loading.textContent = "Nem sikerült betölteni a képet: " + filename;
      };
      pre.src = src;

      counter.textContent = `${idx + 1} / ${IMAGES.length}`;
      nameEl.textContent = filename;

      if (updateHash) history.replaceState(null, "", `#${idx + 1}`);
    }

    function next(){ setPhoto(idx + 1); }
    function prev(){ setPhoto(idx - 1); }

    document.getElementById("tapLeft").addEventListener("click", prev);
    document.getElementById("tapRight").addEventListener("click", next);
    document.getElementById("arrowLeft").addEventListener("click", prev);
    document.getElementById("arrowRight").addEventListener("click", next);

    window.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft") prev();
      if (e.key === "ArrowRight") next();
    });

    let startX = null, startY = null, tracking = false;

    window.addEventListener("touchstart", (e) => {
      if (e.touches.length !== 1) return;
      tracking = true;
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
    }, { passive: true });

    window.addEventListener("touchmove", (e) => {
      if (!tracking || startX === null || startY === null) return;
      const dx = e.touches[0].clientX - startX;
      const dy = e.touches[0].clientY - startY;
      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 8) e.preventDefault();
    }, { passive: false });

    window.addEventListener("touchend", (e) => {
      if (!tracking || startX === null || startY === null) return;
      tracking = false;

      const t = e.changedTouches && e.changedTouches[0];
      if (!t) return;

      const dx = t.clientX - startX;
      const dy = t.clientY - startY;

      if (Math.abs(dx) > 45 && Math.abs(dx) > Math.abs(dy)) {
        if (dx < 0) next(); else prev();
      }

      startX = startY = null;
    }, { passive: true });

    function fromHash(){
      const h = location.hash.replace("#","");
      const n = parseInt(h, 10);
      if (Number.isFinite(n) && n >= 1 && n <= IMAGES.length) {
        setPhoto(n - 1, { updateHash: false });
      } else {
        setPhoto(0, { updateHash: true });
      }
    }

    window.addEventListener("hashchange", fromHash);

    if (!IMAGES.length) {
      loading.textContent = "No images listed in IMAGES[]";
    } else {
      fromHash();
    }
  </script>
</body>
</html>
